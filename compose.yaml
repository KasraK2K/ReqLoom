services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: httpclient-app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BACKEND_PORT: "3500"
      MONGODB_URI: mongodb://mongodb:27017/restify
      MONGODB_SERVER_SELECTION_TIMEOUT_MS: "${MONGODB_SERVER_SELECTION_TIMEOUT_MS:-5000}"
      JWT_SECRET: "${JWT_SECRET:-replace-with-a-long-random-secret}"
      COOKIE_NAME: "${COOKIE_NAME:-restify_session}"
      COOKIE_DOMAIN: "${COOKIE_DOMAIN:-}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      FRONTEND_ORIGIN: "${DOCKER_FRONTEND_ORIGIN:-http://localhost:3500,http://127.0.0.1:3500}"
      UNLOCK_TTL_MINUTES: "${UNLOCK_TTL_MINUTES:-15}"
    ports:
      - "${APP_PORT:-3500}:3500"

  mongodb:
    image: mongo:7
    container_name: httpclient-mongodb
    restart: unless-stopped
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - ./backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand({ ping: 1 }).ok\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mongodb_data: