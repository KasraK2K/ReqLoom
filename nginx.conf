# Replace <domain> before moving this file into /etc/nginx/sites-available/.
# Public site:
#   https://<domain>/      -> frontend
#   https://<domain>/api/* -> backend
#
# In the current Docker image both routes still land on the same app container
# because the backend serves the built frontend bundle as well.

server {
    listen 80;
    listen [::]:80;
    server_name <domain>;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://127.0.0.1:3500;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
    }

    location / {
        proxy_pass http://127.0.0.1:3500;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
    }
}
